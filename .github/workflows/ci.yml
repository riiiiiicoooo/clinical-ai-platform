name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: |
          ruff check src/ --select E,F,W,I --ignore E501

      - name: Type check with mypy
        run: |
          mypy src/ --ignore-missing-imports --no-strict-optional

  hipaa-compliance-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
          pip install -r requirements.txt

      - name: Security scan with Bandit (HIPAA-sensitive)
        run: |
          bandit -r src/ -ll -ii

      - name: Check for hardcoded secrets
        run: |
          # Scan for potential PHI/PII leaks in code
          echo "Checking for hardcoded secrets and PHI patterns..."
          ! grep -rn "SSN\|social.security\|patient_name.*=" src/ --include="*.py" | grep -v "def \|#\|class \|import \|__" || echo "Review above matches for potential PHI exposure"

      - name: Check dependencies for vulnerabilities
        run: |
          pip install pip-audit
          pip-audit --strict || true

  guardrail-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate guardrail configuration
        run: |
          python -c "
          from src.guardrails.phi_detector import PHIDetector
          detector = PHIDetector()
          # Test PHI detection patterns
          test_cases = [
              ('SSN: 123-45-6789', True),
              ('Phone: (555) 123-4567', True),
              ('Hello world', False),
              ('MRN: MRN-123456', True),
              ('email@test.com', True),
          ]
          for text, expected in test_cases:
              result = detector.has_phi(text)
              assert result == expected, f'PHI detection failed for: {text} (expected={expected}, got={result})'
          print('All PHI detection guardrail tests passed')
          "

      - name: Validate RBAC configuration
        run: |
          python -c "
          from src.compliance.rbac import RBACEngine
          rbac = RBACEngine()
          # Verify role hierarchy
          assert rbac.check_permission('admin', 'manage_users')
          assert rbac.check_permission('clinician', 'view_phi')
          assert not rbac.check_permission('analyst', 'view_phi')
          print('All RBAC configuration tests passed')
          "

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          if [ -f Dockerfile ]; then
            docker build -t clinical-ai-platform .
          elif [ -f docker-compose.yml ]; then
            echo "Docker Compose found — validating config"
            docker compose config
          else
            echo "No Dockerfile or docker-compose.yml found, skipping"
          fi
